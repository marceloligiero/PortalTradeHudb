# ══════════════════════════════════════════════════════
# Override para DESENVOLVIMENTO LOCAL — hot reload
# NÃO fazer deploy deste ficheiro no servidor Windows.
# É carregado automaticamente pelo docker compose em dev.
#
# Backend:  uvicorn --reload + volume mount do código
# Frontend: Vite dev server (porta 5173) + volume mount do src/
#
# Arranque: docker compose up
# Acesso:   http://localhost:5173  (frontend Vite)
#           http://localhost:8100  (backend API)
# ══════════════════════════════════════════════════════

services:

  tradehub-backend:
    build:
      target: deps                        # stage com packages, sem código (vem do volume)
    volumes:
      - ./backend:/app/backend            # hot reload do código Python
      - ./database/migrations:/app/database/migrations:ro
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"

  tradehub-frontend:
    build:
      context: ./frontend
      target: builder                     # stage Node.js com node_modules instalados
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_BASE_URL: http://tradehub-backend:8000

  tradehub-db:
    ports:
      - "${DB_PORT:-3307}:3306"           # acesso directo à DB em dev

  tradehub-grafana:
    environment:
      # Em dev: desactivar home dashboard override e analytics
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ""
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Em dev: acesso directo sem nginx (sem subpath)
      GF_SERVER_HTTP_PORT: "3001"
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3001}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # SSO desactivado em dev por defeito (evitar dependência do Azure em dev)
      GF_AUTH_AZUREAD_ENABLED: "false"
    # Em dev os dashboards podem ser editados na UI (override do provisioning)
    volumes:
      # Override apenas o ficheiro de provider dos dashboards (allowUiUpdates: true em dev)
      - ./grafana/dev/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      # Dashboards com permissão de escrita (sem :ro) para poder guardar edições na UI
      - ./grafana/dashboards:/var/lib/grafana/dashboards
