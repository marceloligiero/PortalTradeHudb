apiVersion: 1

groups:
  - orgId: 1
    name: TradeHub Alerts
    folder: TradeHub
    interval: 5m
    rules:

      # ── 1. Chamados críticos sem resposta há > 4h ────────────────────────────
      - uid: alert-chamados-criticos
        title: "Chamados críticos sem resposta (> 4h)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 21600   # 6h em segundos
              to: 0
            datasourceUid: tradehub-mysql
            model:
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM chamados
                WHERE priority = 'CRITICA'
                  AND status = 'ABERTO'
                  AND TIMESTAMPDIFF(HOUR, created_at, NOW()) > 4
              format: table
              refId: A
          - refId: B
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Chamados CRÍTICOS abertos há mais de 4 horas sem resposta."
          description: "Verificar Portal de Chamados."
        labels:
          severity: critical

      # ── 2. Planos de formação em atraso ────────────────────────────────────
      - uid: alert-planos-atraso
        title: "Planos de formação em atraso (> 5)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: tradehub-mysql
            model:
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM training_plans
                WHERE end_date < NOW()
                  AND status NOT IN ('COMPLETED')
                  AND is_active = 1
              format: table
              refId: A
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: "Mais de 5 planos de formação ultrapassaram a data de conclusão."
        labels:
          severity: warning

      # ── 3. Pico de erros tutoria (> 10 novos em 24h) ───────────────────────
      - uid: alert-erros-tutoria-pico
        title: "Pico de erros tutoria (> 10 em 24h)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: tradehub-mysql
            model:
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM tutoria_errors
                WHERE created_at >= NOW() - INTERVAL 24 HOUR
                  AND is_active = 1
              format: table
              refId: A
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Mais de 10 erros de tutoria nas últimas 24 horas."
        labels:
          severity: warning

      # ── 4. Erros internos pendentes > 15 ────────────────────────────────────
      - uid: alert-erros-internos-pendentes
        title: "Erros internos pendentes (> 15)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: tradehub-mysql
            model:
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM internal_errors
                WHERE status IN ('PENDENTE','AGUARDANDO_GRAVADOR')
                  AND is_active = 1
              format: table
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [15]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: "Mais de 15 erros internos aguardam avaliação."
        labels:
          severity: warning

      # ── 5. Utilizadores pendentes de aprovação > 3 ────────────────────────
      - uid: alert-users-pendentes
        title: "Utilizadores pendentes de aprovação (> 3)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: tradehub-mysql
            model:
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM users
                WHERE is_pending = 1
              format: table
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [3]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Mais de 3 utilizadores aguardam aprovação de conta."
        labels:
          severity: info
