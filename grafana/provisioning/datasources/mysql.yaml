apiVersion: 1

datasources:
  - name: TradeHub MySQL
    type: mysql
    uid: tradehub-mysql
    url: tradehub-db:3306
    user: ${MYSQL_USER}
    secureJsonData:
      password: ${MYSQL_PASSWORD}
    jsonData:
      database: ${MYSQL_DATABASE}
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      connectionTimeout: 30
    isDefault: true
    editable: false
