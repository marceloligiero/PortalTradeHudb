# ══════════════════════════════════════════════════════
# Portal TradeHub — Docker Compose
# ══════════════════════════════════════════════════════
# Deploy: Windows Server (isolado de outras aplicações)
#
# ISOLAMENTO GARANTIDO:
#   - Rede Docker própria (tradehub-network), isolada da rede default
#   - Container names prefixados (tradehub-*), sem colisão com outras apps
#   - Volumes nomeados prefixados (tradehub_*), sem colisão
#   - Portas altas por defeito (8100, 8080, 3307)
#   - Memory + CPU limits em todos os containers
#   - Sem host networking, sem privileged mode
#
# Arranque:  docker compose up -d
# Paragem:   docker compose down
# Estado:    docker compose ps
# ══════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────
  # Backend — FastAPI (Python 3.13)
  # ──────────────────────────────────────────────────────
  tradehub-backend:
    container_name: tradehub-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    env_file: ./backend/.env
    depends_on:
      tradehub-db:
        condition: service_healthy
    networks:
      - tradehub-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ──────────────────────────────────────────────────────
  # Frontend — React servido por nginx
  # nginx.conf: SPA routing + proxy /api → tradehub-backend:8000
  # ──────────────────────────────────────────────────────
  tradehub-frontend:
    container_name: tradehub-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - tradehub-backend
    networks:
      - tradehub-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # ──────────────────────────────────────────────────────
  # Grafana — Dashboards analíticos (port 3001)
  # Acesso: http://localhost:3001  (anonymous viewer enabled)
  # ──────────────────────────────────────────────────────
  tradehub-grafana:
    container_name: tradehub-grafana
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      # Admin
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-tradehub_grafana}
      # Anonymous viewer — React iframes don't need auth
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Allow embedding in iframes (X-Frame-Options)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Serve under /grafana/ subpath (nginx proxy)
      GF_SERVER_DOMAIN: "${GRAFANA_DOMAIN:-localhost}"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Disable login form for viewers (anonymous already enabled)
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # MySQL credentials for provisioned datasource
      MYSQL_USER: ${MYSQL_USER:-tradehub_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tradehub_db}
    volumes:
      - tradehub_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      tradehub-db:
        condition: service_healthy
    networks:
      - tradehub-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ──────────────────────────────────────────────────────
  # Base de dados — MySQL 8.0
  # ──────────────────────────────────────────────────────
  tradehub-db:
    container_name: tradehub-db
    image: mysql:8.0.39
    volumes:
      - tradehub_mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tradehub_db}
      MYSQL_USER: ${MYSQL_USER:-tradehub_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tradehub-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

# ── Volumes nomeados (prefixo tradehub_) ────────────────
volumes:
  tradehub_mysql_data:
    name: tradehub_mysql_data
  tradehub_grafana_data:
    name: tradehub_grafana_data

# ── Rede isolada (não usa a rede default do Docker) ─────
networks:
  tradehub-network:
    name: tradehub-network
    driver: bridge
