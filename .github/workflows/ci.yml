name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Password for the ephemeral CI MySQL container (no real data, safe to have fallback)
  CI_DB_PASS: ${{ secrets.CI_MYSQL_ROOT_PASSWORD || 'ci-test-pass' }}

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0.39
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD || 'ci-test-pass' }}
          MYSQL_DATABASE: tradehub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -pci-test-pass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Generate ephemeral CI secret key
        run: echo "CI_SECRET_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root -p"$CI_DB_PASS" 2>/dev/null && break
            sleep 2
          done

      - name: Seed CI admin user
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://root:${{ secrets.CI_MYSQL_ROOT_PASSWORD || 'ci-test-pass' }}@127.0.0.1:3306/tradehub_test
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
        run: python scripts/seed_ci_admin.py

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://root:${{ secrets.CI_MYSQL_ROOT_PASSWORD || 'ci-test-pass' }}@127.0.0.1:3306/tradehub_test
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ALLOWED_ORIGINS: "http://localhost"
          DEBUG: "true"
        run: python -m pytest -v --tb=short

      - name: SAST — Bandit
        working-directory: backend
        run: |
          pip install bandit[toml]
          bandit -r app/ -ll -ii --exit-zero

      - name: Dependency audit — pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt || true

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Dependency audit — npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true
