# ══════════════════════════════════════════════════════
# Dependabot — Atualizações automáticas de dependências
# ══════════════════════════════════════════════════════
version: 2

updates:
  # ── Python (pip) ─────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps):"

  # ── Node.js (npm) ───────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps):"

  # ── GitHub Actions ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci):"

  # ── Docker ──────────────────────────────────────────
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker):"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker):"
