# ════════════════════════════════════════════════════════════════════════════
# deploy/nginx.conf — Reverse proxy para PortalTradeHub
#
# Instalação:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/tradehub
#   sudo ln -sf /etc/nginx/sites-available/tradehub /etc/nginx/sites-enabled/tradehub
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para HTTPS com Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d portaltradedatahub.example.com
# ════════════════════════════════════════════════════════════════════════════

upstream tradehub_backend {
    # uvicorn com 4 workers na porta 8000 (só escuta localhost)
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Redirecionar HTTP → HTTPS (activar depois de configurar SSL) ───────────
# server {
#     listen 80;
#     server_name portaltradedatahub _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;

    # Substituir pelo hostname real do servidor
    server_name portaltradedatahub _;

    # ── Segurança ────────────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Tamanho máximo de upload (ficheiros Excel, PDFs) ─────────────────────
    client_max_body_size 50M;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ── Cabeçalhos proxy ─────────────────────────────────────────────────────
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/tradehub-access.log;
    error_log  /var/log/nginx/tradehub-error.log;

    # ── Cache de assets estáticos (hashed pelo Vite) ─────────────────────────
    # O FastAPI já serve /assets com Cache-Control correcto via constants.py.
    # nginx intercepta /assets para evitar round-trip ao uvicorn.
    location /assets/ {
        alias /opt/tradehub/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /locales/ {
        alias /opt/tradehub/frontend/dist/locales/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ── favicon / robots / manifest ──────────────────────────────────────────
    location ~ ^/(favicon\.ico|robots\.txt|manifest\.json|logo.*\.(png|svg))$ {
        alias /opt/tradehub/frontend/dist/;
        try_files /$uri =404;
        access_log off;
    }

    # ── Tudo o resto → uvicorn (API + SPA catch-all) ─────────────────────────
    location / {
        proxy_pass http://tradehub_backend;

        # WebSocket support (para chat/notificações em tempo real)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

