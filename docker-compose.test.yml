# ══════════════════════════════════════════════════════
# Portal TradeHub — TESTES / QA
# ══════════════════════════════════════════════════════
# Uso: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Diferenças vs produção:
#   - Portas altas (8180, 8107, 3308) para não colidir com dev/prod
#   - Volumes e rede prefixados com "test" para isolamento total
#   - DB inicializa com dados de teste
#   - Menos recursos alocados
# ══════════════════════════════════════════════════════

services:

  tradehub-backend:
    container_name: tradehub-backend-test
    env_file: ./backend/.env.test
    ports:
      - "8107:8000"
    environment:
      DEBUG: "true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  tradehub-frontend:
    container_name: tradehub-frontend-test
    ports:
      - "8180:80"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  tradehub-db:
    container_name: tradehub-db-test
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-test_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tradehub_test_db}
      MYSQL_USER: ${MYSQL_USER:-tradehub_test_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-test_pass}
    volumes:
      - tradehub_mysql_test:/var/lib/mysql
      - ./database/init_mysql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/init_data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  tradehub_mysql_test:
    name: tradehub_mysql_test

networks:
  tradehub-network:
    name: tradehub-test-network
